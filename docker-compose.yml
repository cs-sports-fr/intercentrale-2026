# docker-compose.yml

services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=toss-register
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_DOCKER_NETWORK_IP}:5432/toss-register?schema=public
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./rds_export_clean.sql:/docker-entrypoint-initdb.d/import.sql:ro
    networks:
        dbnet:
          ipv4_address: 10.5.0.4
  prisma-migrate:
    container_name: prisma-migrate
    build: 
      context: .
      dockerfile: ./prisma-migrate.Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_DOCKER_NETWORK_IP}:5432/toss-register?schema=public
    depends_on:
      - db
    networks:
        dbnet:
          ipv4_address: 10.5.0.6
  backend:
      build:
        context: .
        dockerfile: ./backend.Dockerfile
      ports:
        - "8081:8081"
      volumes:
        - .:/workspace
      depends_on:
        - db
      env_file:
        - .env
      environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_DOCKER_NETWORK_IP}:5432/toss-register?schema=public
      - MODE=prod
      networks:
        dbnet:
          ipv4_address: 10.5.0.5
      command: ["sh", "-c", "gunicorn -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8081 --timeout 180 --workers 4 app:app"]

  prisma-studio:
    build:
      context: .
      dockerfile: ./prisma.Dockerfile
    ports:
      - "5555:5555"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_DOCKER_NETWORK_IP}:5432/toss-register?schema=public
    networks:
      - dbnet
  
volumes:
  db_data:

networks:
  dbnet:
    driver: bridge
    ipam:
     config:
       - subnet: 10.5.0.0/16
         gateway: 10.5.0.1
